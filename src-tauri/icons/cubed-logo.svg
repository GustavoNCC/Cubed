<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="face-top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="face-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="face-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a21caf"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="#0d0f1a"/>

  <!-- Scale factor: viewBox 64 -> 512, offset to center -->
  <g transform="translate(96,80) scale(5)">
    <!-- Bloque superior izquierdo -->
    <polygon points="8,14 24,8 40,14 24,20" fill="url(#face-top)"/>
    <polygon points="8,14 8,26 24,32 24,20" fill="url(#face-left)"/>
    <polygon points="24,20 24,32 40,26 40,14" fill="url(#face-right)"/>

    <!-- Bloque superior derecho -->
    <polygon points="36,14 52,8 64,14 48,20" fill="url(#face-top)" opacity="0.85"/>
    <polygon points="48,20 48,32 64,26 64,14" fill="url(#face-right)" opacity="0.85"/>

    <!-- Bloque izquierdo medio -->
    <polygon points="0,24 16,18 32,24 16,30" fill="url(#face-top)"/>
    <polygon points="0,24 0,36 16,42 16,30" fill="url(#face-left)"/>
    <polygon points="16,30 16,42 32,36 32,24" fill="url(#face-right)"/>

    <!-- Bloque inferior izquierdo -->
    <polygon points="8,40 24,34 40,40 24,46" fill="url(#face-top)"/>
    <polygon points="8,40 8,52 24,58 24,46" fill="url(#face-left)"/>
    <polygon points="24,46 24,58 40,52 40,40" fill="url(#face-right)"/>

    <!-- Bloque inferior derecho -->
    <polygon points="36,40 52,34 64,40 48,46" fill="url(#face-top)" opacity="0.85"/>
    <polygon points="48,46 48,58 64,52 64,40" fill="url(#face-right)" opacity="0.85"/>

    <!-- Neon edge highlights -->
    <polyline points="8,14 24,8 52,8 64,14" stroke="#f0abfc" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
    <polyline points="0,24 0,36 8,40 8,52 24,58" stroke="#c084fc" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
    <polyline points="24,58 52,46 64,40" stroke="#f0abfc" stroke-width="1" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- CUBED text -->
  <text x="256" y="460" font-family="monospace" font-size="52" font-weight="bold" fill="#c084fc" text-anchor="middle" letter-spacing="12" opacity="0.9">CUBED</text>
</svg>
